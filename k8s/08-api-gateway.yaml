apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: todo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: YOURUSER/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: AUTH_SERVICE_URL
              valueFrom: { configMapKeyRef: { name: todo-config, key: AUTH_SERVICE_URL } }
            - name: TASK_SERVICE_URL
              valueFrom: { configMapKeyRef: { name: todo-config, key: TASK_SERVICE_URL } }
            - name: NOTIFICATION_SERVICE_URL
              valueFrom: { configMapKeyRef: { name: todo-config, key: NOTIFICATION_SERVICE_URL } }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 15
---
# NodePort exposes this on <ANY_NODE_IP>:30300 without needing an Ingress
# controller — the simplest option on a bare kubeadm cluster. If you set up
# Ingress instead (see k8s/10-ingress.yaml), you can change this back to
# ClusterIP.
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: todo
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
