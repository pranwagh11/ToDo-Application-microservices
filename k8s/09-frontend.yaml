apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: todo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: YOURUSER/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            # IMPORTANT: replace <NODE_IP> with a real, reachable IP of any
            # node in your kubeadm cluster (e.g. `kubectl get nodes -o wide`).
            # This is what the BROWSER uses to reach the API Gateway, so it
            # must be an address your browser can resolve — not a cluster-
            # internal DNS name like "api-gateway".
            - name: API_BASE_URL
              value: "http://<NODE_IP>:30300"
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: todo
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
