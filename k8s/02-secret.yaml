# EDIT THE VALUES BELOW BEFORE APPLYING. Do not commit this file with real
# secrets to source control — add k8s/02-secret.yaml to .gitignore, or generate
# it imperatively instead:
#
#   kubectl create secret generic todo-secrets -n todo \
#     --from-literal=DB_PASSWORD='your-real-password' \
#     --from-literal=JWT_SECRET="$(node -e "console.log(require('crypto').randomBytes(32).toString('hex'))")" \
#     --from-literal=SMTP_HOST='smtp.gmail.com' \
#     --from-literal=SMTP_PORT='587' \
#     --from-literal=SMTP_USER='your-email@gmail.com' \
#     --from-literal=SMTP_PASSWORD='your-16-char-app-password' \
#     --from-literal=SMTP_FROM='your-email@gmail.com'
#
apiVersion: v1
kind: Secret
metadata:
  name: todo-secrets
  namespace: todo
type: Opaque
stringData:
  DB_PASSWORD: "root1234"
  JWT_SECRET: "change-this-to-a-long-random-string"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "your-email@gmail.com"
  SMTP_PASSWORD: "your-16-char-app-password"
  SMTP_FROM: "your-email@gmail.com"
