apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: todo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: YOURUSER/notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 6000
          env:
            - name: PORT
              value: "6000"
            - name: SMTP_HOST
              valueFrom: { secretKeyRef: { name: todo-secrets, key: SMTP_HOST } }
            - name: SMTP_PORT
              valueFrom: { secretKeyRef: { name: todo-secrets, key: SMTP_PORT } }
            - name: SMTP_USER
              valueFrom: { secretKeyRef: { name: todo-secrets, key: SMTP_USER } }
            - name: SMTP_PASSWORD
              valueFrom: { secretKeyRef: { name: todo-secrets, key: SMTP_PASSWORD } }
            - name: SMTP_FROM
              valueFrom: { secretKeyRef: { name: todo-secrets, key: SMTP_FROM } }
          readinessProbe:
            httpGet: { path: /health, port: 6000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 6000 }
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: todo
spec:
  selector:
    app: notification-service
  ports:
    - port: 6000
      targetPort: 6000
