apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: todo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      containers:
        - name: task-service
          image: YOURUSER/task-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: DB_HOST
              valueFrom: { configMapKeyRef: { name: todo-config, key: DB_HOST } }
            - name: DB_PORT
              valueFrom: { configMapKeyRef: { name: todo-config, key: DB_PORT } }
            - name: DB_USER
              valueFrom: { configMapKeyRef: { name: todo-config, key: DB_USER } }
            - name: DB_NAME
              valueFrom: { configMapKeyRef: { name: todo-config, key: DB_NAME_TASK } }
            - name: JWT_EXPIRES_IN
              valueFrom: { configMapKeyRef: { name: todo-config, key: JWT_EXPIRES_IN } }
            - name: NOTIFICATION_SERVICE_URL
              valueFrom: { configMapKeyRef: { name: todo-config, key: NOTIFICATION_SERVICE_URL } }
            - name: FRONTEND_URL
              valueFrom: { configMapKeyRef: { name: todo-config, key: FRONTEND_URL } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: todo-secrets, key: DB_PASSWORD } }
            - name: JWT_SECRET
              # Must be identical to auth-service's JWT_SECRET — both read
              # from the same todo-secrets key, so this is automatic here.
              valueFrom: { secretKeyRef: { name: todo-secrets, key: JWT_SECRET } }
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: todo
spec:
  selector:
    app: task-service
  ports:
    - port: 5000
      targetPort: 5000
